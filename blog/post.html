<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="doc-title">loading&hellip; — Susanket</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90' font-family='monospace' fill='%23a3d9c0'%3E*%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
</head>
<body>
<canvas id="starfield" aria-hidden="true"></canvas>

<div class="topbar">
  <nav>
    <a href="../index.html">index</a>
    <a href="index.html" class="current">blog</a>
  </nav>
  <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle light and dark theme">* light</button>
</div>

<main class="wrap">
  <div class="post-header">
    <a class="back" href="index.html">&larr; back to blog</a>
    <div id="post-header-content">
      <p class="loading">loading post&hellip;</p>
    </div>
  </div>

  <article class="post-body" id="post-body"></article>

  <div class="post-footer">
    <a class="link" href="index.html">&larr; all posts</a>
  </div>
</main>

<script src="../assets/js/theme.js"></script>
<script src="../assets/js/starfield.js"></script>
<script src="../assets/js/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var slug = params.get("slug");
  var headerEl = document.getElementById("post-header-content");
  var bodyEl = document.getElementById("post-body");

  function fmtDate(iso) {
    var d = new Date(iso + "T00:00:00");
    if (isNaN(d)) return iso;
    return d.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
  }

  function readingTime(text) {
    var words = text.trim().split(/\s+/).length;
    return Math.max(1, Math.round(words / 220));
  }

  function fail(msg) {
    headerEl.innerHTML = '<p class="loading">' + msg + "</p>";
  }

  if (!slug) {
    fail("no post specified.");
  } else {
    fetch("../content/posts/manifest.json")
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var meta = (data.posts || []).find(function (p) { return p.slug === slug; });
        if (!meta) throw new Error("post not found");

        return fetch("../content/posts/" + slug + ".md")
          .then(function (r) {
            if (!r.ok) throw new Error("markdown file missing for this post");
            return r.text();
          })
          .then(function (md) {
            document.getElementById("doc-title").textContent = meta.title + " — Susanket";
            var tags = (meta.tags || []).join(" &middot; ");
            headerEl.innerHTML =
              "<h1>" + escapeHtml(meta.title) + "</h1>" +
              '<p class="post-meta">' + fmtDate(meta.date) + " &middot; " + readingTime(md) + " min read" + (tags ? " &middot; " + tags : "") + "</p>";

            // --- 1. Set up custom marked renderer ---
            var renderer = new marked.Renderer();

            renderer.image = function(token) {
              var h = escapeHtml(token.href);
              var t = escapeHtml(token.text || '');
              return '<figure><img src="' + h + '" alt="' + t + '">' +
                     '<figcaption>' + t + '</figcaption></figure>';
            };

            renderer.link = function(token) {
              var href = token.href;
              var text = this.parser.parseInline(token.tokens);
              var domain = '';
              try { domain = new URL(href).hostname.replace(/^www\./, ''); }
              catch(e) { domain = href; }
              var h = escapeHtml(href);
              var t = escapeHtml(text || href);
              var d = escapeHtml(domain);
              return '<a href="' + h + '" class="link-button" target="_blank" rel="noopener">' +
                     '<span class="link-domain">' + d + '</span></a>';
            };

            marked.use({ renderer: renderer });

            // --- 2. Protect LaTeX math from marked.js ---
            var displayMath = [];
            var inlineMath = [];

            md = md.replace(/\$\$([\s\S]*?)\$\$/g, function(_, math) {
              var i = displayMath.length;
              displayMath.push(math);
              return 'DSPMATH' + i + 'DSPEND';
            });

            md = md.replace(/\$(?!\$)([\s\S]*?)\$(?!\$)/g, function(_, math) {
              var i = inlineMath.length;
              inlineMath.push(math);
              return 'INLMATH' + i + 'INLEND';
            });

            // --- 3. Render markdown ---
            var html = marked.parse(md);

            html = html.replace(/DSPMATH(\d+)DSPEND/g, function(_, i) {
              return '$$' + displayMath[parseInt(i)] + '$$';
            });
            html = html.replace(/INLMATH(\d+)INLEND/g, function(_, i) {
              return '$' + inlineMath[parseInt(i)] + '$';
            });

            bodyEl.innerHTML = html;

            // --- 4. Render LaTeX with KaTeX ---
            renderMathInElement(bodyEl, {
              delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false}
              ],
              throwOnError: false
            });

            // --- 5. Insert header image between heading and body ---
            var headerSrc = meta.headerImage;
            var headerCap = meta.headerCaption;
            if (headerSrc) {
              var hDiv = document.createElement('div');
              hDiv.className = 'post-header-image-wrap';
              hDiv.innerHTML =
                '<img src="' + escapeHtml(headerSrc) + '" alt="' + escapeHtml(headerCap || '') + '">' +
                (headerCap ? '<span class="img-caption">' + escapeHtml(headerCap) + '</span>' : '');
              bodyEl.parentNode.insertBefore(hDiv, bodyEl);
            }
          });
      })
      .catch(function (err) {
        fail("couldn\u2019t load this post (" + escapeHtml(err.message) + "). If you just opened this file directly, run a local server \u2014 see the README.");
      });
  }

  function escapeHtml(str) {
    var div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }
})();
</script>
</body>
</html>
