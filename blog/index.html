<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>blog — Susanket</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90' font-family='monospace' fill='%23a3d9c0'%3E*%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<canvas id="starfield" aria-hidden="true"></canvas>

<div class="topbar">
  <nav>
    <a href="../index.html">index</a>
    <a href="index.html" class="current">blog</a>
  </nav>
  <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle light and dark theme">* light</button>
</div>

<main class="wrap">
  <h1 class="page-title">blog</h1>
  <p class="page-sub">notes on location encoding, geospatial ML, and whatever else comes up.</p>

  <ul class="post-list" id="post-list">
    <li class="loading">loading posts&hellip;</li>
  </ul>
</main>

<script src="../assets/js/theme.js"></script>
<script src="../assets/js/starfield.js"></script>
<script>
(function () {
  var listEl = document.getElementById("post-list");

  function fmtDate(iso) {
    var d = new Date(iso + "T00:00:00");
    if (isNaN(d)) return iso;
    return d.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
  }

  fetch("../content/posts/manifest.json")
    .then(function (r) {
      if (!r.ok) throw new Error("manifest not found");
      return r.json();
    })
    .then(function (data) {
      var posts = (data.posts || [])
        .filter(function (p) { return p.published !== false; })
        .sort(function (a, b) { return new Date(b.date) - new Date(a.date); });

      if (posts.length === 0) {
        listEl.innerHTML = '<li class="empty-state">no posts yet &mdash; check back soon.</li>';
        return;
      }

      listEl.innerHTML = posts.map(function (p) {
        var tags = (p.tags || []).join(" &middot; ");
        return (
          '<li class="post-item">' +
            '<a class="post-title" href="post.html?slug=' + encodeURIComponent(p.slug) + '">' + escapeHtml(p.title) + "</a>" +
            '<div class="post-meta">' + fmtDate(p.date) + (tags ? " &middot; " + tags : "") + "</div>" +
            '<p class="post-excerpt">' + escapeHtml(p.excerpt || "") + "</p>" +
          "</li>"
        );
      }).join("");
    })
    .catch(function (err) {
      listEl.innerHTML = '<li class="empty-state">couldn\u2019t load posts (' + escapeHtml(err.message) + '). If you just opened this file directly, run a local server &mdash; see the README.</li>';
    });

  function escapeHtml(str) {
    var div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }
})();
</script>
</body>
</html>
